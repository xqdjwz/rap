<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>说唱人格测试 | 测测你骨子里最像哪位说唱歌手</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f7;
      color: #1d1d1f;x
      min-height: 100vh;
    }
    main {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      width: 100%;
      max-width: 420px;
    }
    .card {
      background: white;
      border-radius: 24px;
      box-shadow: 0 2px 20px rgba(0,0,0,0.06);
      padding: 48px 32px;
      text-align: center;
    }
    h1 {
      font-size: 28px;
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 12px;
    }
    .desc {
      color: #86868b;
      font-size: 15px;
      line-height: 1.5;
      margin-bottom: 24px;
    }
    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-bottom: 32px;
    }
    .tag {
      background: #f5f5f7;
      color: #86868b;
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 500;
    }
    .start-btn {
      width: 100%;
      padding: 14px;
      background: #6c5ce7;
      color: white;
      border: none;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .start-btn:hover {
      background: #5f4dd0;
    }
    .start-btn:active {
      transform: scale(0.98);
      background: #5343b8;
    }
    .tip {
      margin-top: 16px;
      font-size: 12px;
      color: #c7c7cc;
    }
    .author {
      margin-top: 20px;
      font-size: 12px;
      color: #c7c7cc;
      text-align: right;
      padding-right: 8px;
    }
  </style>
</head>
<body>
  <main>
    <div class="container">
      <div class="card">
        <h1>测测你骨子里<br>最像哪位说唱歌手</h1>
        <p class="desc">30道题，拆穿你的社交习惯、发疯方式、上头模式和精神底色</p >

        <div class="tags">
          <span class="tag">15维人格分析</span>
          <span class="tag">16种说唱人格</span>
          <span class="tag">雷达图</span>
          <span class="tag">精准锐评</span>
        </div>

        <button class="start-btn">开始测试</button>
        <p class="tip">大约 3 分钟 · 无需登录 · 结果可截图分享</p >
      </div>
      <p class="author">作者：Luca</p >
    </div>
  </main>
</body>
</html>
